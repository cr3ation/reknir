services:
  postgres:
    image: postgres:16-alpine
    container_name: reknir-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reknir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reknir}
      POSTGRES_DB: ${POSTGRES_DB:-reknir}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reknir}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reknir-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-reknir}:${POSTGRES_PASSWORD:-reknir}@postgres:5432/${POSTGRES_DB:-reknir}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DEBUG: ${DEBUG:-True}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      BACKUP_DIR: /backups
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./database:/database
      - ./uploads:/app/uploads
      - ./backups:/backups
      - /app/.venv  # Prevent overwriting venv
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reknir-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent overwriting node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0


volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: reknir-network
